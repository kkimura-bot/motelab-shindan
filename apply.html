<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>無料体験のお申し込み｜MOTE LAB</title>
  <meta name="description" content="MOTE LAB 無料体験のお申し込み。プロがあなたの『選ばれる力』を採点し、伸ばすための具体的な処方を出します。" />
  <meta name="robots" content="noindex" />

  <!-- OGP -->
  <meta property="og:title" content="無料体験のお申し込み｜MOTE LAB" />
  <meta property="og:description" content="プロがあなたの『選ばれる力』を採点。無料体験のお申し込みはこちら。" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://test.mote-lab.group/apply.html" />
  <meta property="og:image" content="https://test.mote-lab.group/images/ogp.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet" />

  <style>
    :root{
      --navy:#1F3A5F; --navy-deep:#152A45; --gold:#C8A04D; --gold-lt:#E7C788;
      --ink:#1A1A1A; --muted:#5B6573; --line:#D7DCE3; --card:#FFFFFF; --bg:#F4F6F9;
      --line-green:#06C755;
      --font:'Noto Sans JP',system-ui,-apple-system,'Hiragino Kaku Gothic ProN',Meiryo,sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font);background:var(--bg);color:var(--ink);line-height:1.8;
      -webkit-font-smoothing:antialiased;}

    /* hero */
    .hero{background:radial-gradient(1200px 500px at 50% -20%, #243b5e, var(--navy-deep) 65%);
      color:#fff;padding:48px 20px 40px;text-align:center;}
    .hero__eyebrow{font-family:Georgia,serif;letter-spacing:.3em;color:var(--gold);font-size:12px;margin-bottom:16px;}
    .hero__title{font-size:28px;font-weight:800;line-height:1.35;margin-bottom:12px;}
    .hero__lead{color:#C7D3E6;font-size:14.5px;line-height:1.8;max-width:520px;margin:0 auto;}

    /* result chip (診断から来た場合) */
    #fromDiagnosis{display:none;max-width:560px;margin:22px auto 0;
      background:rgba(200,160,77,.12);border:1px solid var(--gold);border-radius:12px;padding:14px 18px;}
    #fromDiagnosis .label{font-size:11px;color:var(--gold-lt);letter-spacing:.08em;margin-bottom:4px;}
    #fromDiagnosis .type{font-size:16px;font-weight:700;color:#fff;}
    #fromDiagnosis .type .score{font-family:Georgia,serif;color:var(--gold-lt);margin-left:8px;}

    /* form card */
    .wrap{max-width:560px;margin:-22px auto 0;padding:0 20px 56px;}
    .card{background:var(--card);border-radius:16px;box-shadow:0 8px 30px rgba(21,42,69,.10);padding:30px 26px;}
    .field{margin-bottom:20px;}
    .field > label{display:block;font-size:13.5px;font-weight:700;color:var(--navy);margin-bottom:8px;}
    .req{color:#B0432F;font-size:11px;font-weight:700;margin-left:6px;}
    .opt{color:var(--muted);font-size:11px;font-weight:500;margin-left:6px;}
    input[type=text],input[type=email],input[type=tel],textarea{
      width:100%;font-family:var(--font);font-size:15px;color:var(--ink);
      border:1.5px solid var(--line);border-radius:10px;padding:13px 14px;background:#fff;transition:border-color .15s;}
    input:focus,textarea:focus{outline:none;border-color:var(--gold);}
    textarea{min-height:96px;resize:vertical;line-height:1.7;}

    /* segmented radio */
    .seg{display:flex;gap:10px;flex-wrap:wrap;}
    .seg label{flex:1 1 160px;cursor:pointer;}
    .seg input{position:absolute;opacity:0;pointer-events:none;}
    .seg .box{border:1.5px solid var(--line);border-radius:12px;padding:14px 16px;transition:all .15s;}
    .seg .box .t{font-weight:700;font-size:14.5px;color:var(--navy);}
    .seg .box .s{font-size:12px;color:var(--muted);margin-top:2px;}
    .seg input:checked + .box{border-color:var(--gold);background:rgba(200,160,77,.08);}

    /* consent */
    .consent{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--muted);line-height:1.7;}
    .consent input{margin-top:4px;width:17px;height:17px;accent-color:var(--navy);flex:0 0 auto;}
    .consent a{color:var(--navy);}

    /* submit */
    .submit{width:100%;background:linear-gradient(90deg,var(--gold),var(--gold-lt));color:var(--navy-deep);
      border:none;border-radius:99px;padding:16px;font-size:16px;font-weight:800;cursor:pointer;
      box-shadow:0 6px 20px rgba(200,160,77,.32);transition:transform .1s;font-family:var(--font);}
    .submit:hover{transform:translateY(-1px);}

    /* LINE */
    .line-block{text-align:center;margin-top:26px;padding-top:24px;border-top:1px solid var(--line);}
    .line-block .lead{font-size:13px;color:var(--muted);margin-bottom:12px;}
    .line-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--line-green);
      color:#fff;padding:13px 28px;border-radius:99px;font-size:15px;font-weight:700;text-decoration:none;
      box-shadow:0 4px 14px rgba(6,199,85,.32);}

    .foot{text-align:center;padding:28px 20px 40px;font-size:12px;color:var(--muted);}
    .foot a{color:var(--muted);margin:0 8px;}
    .note{font-size:11px;color:#8a94a3;text-align:center;margin-top:16px;line-height:1.6;}
  </style>
</head>
<body>

  <header class="hero">
    <div class="hero__eyebrow">MOTE LAB</div>
    <h1 class="hero__title">無料体験のお申し込み</h1>
    <p class="hero__lead">プロがあなたの「選ばれる力」を採点し、<br/>伸ばすための具体的な処方を出します。まずは無料で。</p>

    <div id="fromDiagnosis">
      <div class="label">YOUR TYPE（診断結果）</div>
      <div class="type"><span id="dgType"></span><span class="score" id="dgScore"></span></div>
    </div>
  </header>

  <div class="wrap">
    <div class="card">
      <!-- Netlify Forms：data-netlify + honeypot。送信後 /thanks.html へ -->
      <form name="apply" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="/thanks.html">
        <input type="hidden" name="form-name" value="apply" />
        <p hidden><label>この欄は記入しないでください: <input name="bot-field" /></label></p>

        <!-- 診断結果の引き継ぎ（hidden） -->
        <input type="hidden" name="診断タイプ" id="f_type" value="" />
        <input type="hidden" name="総合スコア" id="f_score" value="" />

        <div class="field">
          <label>どちらで受けますか？<span class="req">必須</span></label>
          <div class="seg">
            <label>
              <input type="radio" name="区分" value="個人（恋愛・モテ）" id="seg_personal" checked />
              <div class="box"><div class="t">個人で受ける</div><div class="s">恋愛・モテの強化</div></div>
            </label>
            <label>
              <input type="radio" name="区分" value="法人・チーム（営業力）" id="seg_corporate" />
              <div class="box"><div class="t">仕事で受ける</div><div class="s">営業力・チーム強化</div></div>
            </label>
          </div>
        </div>

        <div class="field">
          <label for="name">お名前<span class="req">必須</span></label>
          <input type="text" id="name" name="お名前" required autocomplete="name" placeholder="山田 太郎" />
        </div>

        <div class="field">
          <label for="email">メールアドレス<span class="req">必須</span></label>
          <input type="email" id="email" name="メールアドレス" required autocomplete="email" placeholder="you@example.com" />
        </div>

        <div class="field">
          <label for="tel">電話番号<span class="opt">任意</span></label>
          <input type="tel" id="tel" name="電話番号" autocomplete="tel" placeholder="090-1234-5678" />
        </div>

        <div class="field">
          <label for="msg">ご相談・ご希望<span class="opt">任意</span></label>
          <textarea id="msg" name="ご相談内容" placeholder="希望日時、今いちばん変えたいこと、など自由にどうぞ。"></textarea>
        </div>

        <div class="field">
          <label class="consent">
            <input type="checkbox" name="プライバシー同意" value="同意する" required />
            <span><a href="privacy.html" target="_blank" rel="noopener">プライバシーポリシー</a>に同意のうえ、お申し込みします。</span>
          </label>
        </div>

        <button type="submit" class="submit">この内容で申し込む →</button>

        <p class="note">※ お申し込み後、担当より日程調整のご連絡をいたします。<br/>入力情報はお申し込み対応の目的のみに使用します。</p>
      </form>

      <!-- 公式LINE -->
      <div class="line-block">
        <div class="lead">詳細は公式LINEにて</div>
        <a class="line-btn" href="https://lin.ee/QVKHSTm" id="lineBtn" target="_blank" rel="noopener noreferrer">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.3c-5.52 0-10 3.62-10 8.08 0 3.99 3.55 7.33 8.35 7.97.32.07.77.21.88.49.1.25.07.64.03.89l-.14.84c-.04.25-.2 1 .88.54 1.07-.45 5.78-3.4 7.89-5.83C21.27 13.6 22 12.04 22 10.38 22 5.92 17.52 2.3 12 2.3zM8.13 12.6H6.2a.4.4 0 0 1-.4-.4V8.93a.4.4 0 0 1 .81 0v2.86h1.52a.4.4 0 0 1 0 .81zm1.5-.4a.4.4 0 0 1-.81 0V8.93a.4.4 0 0 1 .81 0v3.27zm3.93 0a.4.4 0 0 1-.28.38.4.4 0 0 1-.45-.15l-1.68-2.29v2.06a.4.4 0 0 1-.81 0V8.93a.4.4 0 0 1 .73-.23l1.68 2.29V8.93a.4.4 0 0 1 .81 0v3.27zm2.86-2.04a.4.4 0 0 1 0 .81h-1.13v.82h1.13a.4.4 0 0 1 0 .81h-1.53a.4.4 0 0 1-.4-.4V8.93a.4.4 0 0 1 .4-.4h1.53a.4.4 0 0 1 0 .81h-1.13v.82h1.13z"/></svg>
          公式LINEで相談する
        </a>
      </div>
    </div>
  </div>

  <footer class="foot">
    <a href="privacy.html">プライバシーポリシー</a>・<a href="tokushoho.html">特定商取引法に基づく表記</a>
    <div style="margin-top:10px;">© MOTE LAB</div>
  </footer>

  <script>
    // 診断結果の引き継ぎ（URLパラメータ → 表示＋hidden）
    (function(){
      var p = new URLSearchParams(location.search);
      var mode = p.get('mode'), type = p.get('type'), name = p.get('name'), score = p.get('score');
      if(mode === 'corporate'){ document.getElementById('seg_corporate').checked = true; }
      if(type){
        var label = (type ? type : '') + (name ? ' ' + name : '');
        document.getElementById('dgType').textContent = '【' + label + '】';
        document.getElementById('f_type').value = label;
        if(score){
          document.getElementById('dgScore').textContent = '総合 ' + score + ' / 100';
          document.getElementById('f_score').value = score + ' / 100';
        }
        document.getElementById('fromDiagnosis').style.display = 'block';
      }
    })();
  </script>
</body>
</html>
