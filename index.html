    const TYPEFULL = {"VAHO": ["初対面でも会話が途切れず、気づけば場の中心。見た目も中身もそつなくこなすから、周りから「モテるでしょ」と言われ慣れている。", "第一印象・行動力・共感力の三拍子が揃い、弱点らしい弱点がない。自分の見せ方も理解している。", "完成度が高いぶん、伸ばすなら「深さ」。一歩踏み込んだ自己開示や、本命相手への一点突破で、“そつない人”から“忘れられない人”へ。"], "VALO": ["デートの店選びも会話の運びも事前にシミュレーション。感情より「どう動けば成功するか」で考えるので、打率は高いが時々クールに見られる。", "戦略性と行動力。準備を怠らず、再現性のある成果を出せる。", "計算が透けると相手は冷める。共感の比重を少し上げ、“攻略”でなく“共有”の感覚を持つと、信頼が一段深まる。"], "VWHO": ["身だしなみは整っているのに、自分からはグイグイいかない。聞き上手で「一緒にいて落ち着く」と言われるが、そこで止まりがち。", "清潔感と共感力の両立。相手に安心感を与え、長く好かれる。", "待ちの姿勢が機会損失に。月1回でいいから自分から誘う回数を増やすと、“いい人”から“気になる人”に変わる。"], "VWLO": ["おしゃれで一目置かれるが、自分からは動かず、感情もあまり出さない。ミステリアスに見える反面、「何を考えてるか分からない」とも言われる。", "洗練された第一印象とブレない冷静さ。雰囲気で惹きつけられる。", "壁を感じさせると距離が縮まらない。感情を一つ言葉にするだけで、クールさが“奥行き”に変わる。"], "NAHO": ["飾らないのに行動力があり、好きになったら真っ直ぐ。計算なしの素直さで、気づけば相手の懐に入っている。", "自然体・積極性・共感の三立。作らない魅力で信頼されやすい。", "勢い任せで詰めを誤ることも。見た目の最低限（清潔感）を底上げすれば、中身の良さがもっと正しく伝わる。"], "NALO": ["派手さはないが言行一致。約束を守り、筋の通った話をするので、時間をかけて信頼される。一目惚れより“じわじわ”型。", "誠実さと行動力。長期的な関係で本領を発揮する。", "第一印象で損をしがち。最初のひと押しの愛嬌・表情を足すと、誠実さが早く伝わる。"], "NWHO": ["聞き役に回るのが自然で、相手は話していて心地よい。自分の長所も短所も把握していて、無理をしない。", "高い共感力と自己理解。安心感のある関係を築ける。", "受け身すぎて選ばれ待ちに。自分から一歩出る経験を増やすと、“いい聞き役”から“選ばれる人”へ。"], "NWLO": ["目立たないが、話すと中身がある。自分を客観視でき、ブレない。派手な人に埋もれがちだが、分かる人には刺さる。", "自己認識の正確さと安定感。信頼を裏切らない。", "存在に気づかれないのが最大の損。見た目と発信を少し足すだけで、隠れていた実力が一気に表に出る。"], "VAHG": ["頑張って演出して、自分からも動く。なのに手応えが薄い。良かれと思った行動が、相手には少し重い・ズレていることに気づけていない。", "行動力と情熱は十分。エネルギーの総量は誰にも負けない。", "方向のズレを直せば一気に化ける。「自分がどう映っているか」をプロに答え合わせしてもらうのが、最短の近道。"], "VALG": ["自分のスタイルに自信があり、貫く。だが「良かれ」の演出が空回りしていることに気づかず、評価とのギャップが大きい。", "揺るがない自信と行動力。芯の強さは武器になる。", "自信の“中身”を客観視できると最強。独りよがりの危うさを、第三者の採点で補正するのが効く。"], "VWHG": ["相手のために一生懸命。優しいし気も遣う。なのに「いい人どまり」。尽くす方向が少しズレていて、努力が報われにくい。", "思いやりと献身。本気で相手を大事にできる稀有な心。", "頑張る“方向”を変えるだけで報われる。何が刺さって何が空回りか、答え合わせで見極めるのが鍵。"], "VWLG": ["見た目や雰囲気で武装して、本心は見せない。傷つきたくない繊細さの裏返し。クールに見えるが、相手は距離を感じている。", "自己演出のセンスと、内に秘めた繊細な感受性。", "鎧を一枚脱ぐと一気に近づける。安全に自己開示を練習できる場で、“見せても大丈夫”を体験するのが効く。"], "NAHG": ["素直で行動的、悪気はゼロ。なのに距離の詰め方が早すぎたり熱すぎたりして、相手を引かせてしまうことがある。", "裏表のなさと行動力。人として信頼できる土台がある。", "距離感の“間合い     const NAVY="#1F3A5F", NAVYD="#152A45", GOLD="#C8A04D", GOLDLT="#E7C788",

    // ---- スコア→偏差値→上位% ----
    function scoreToHensachi(total) {
      const mean = 55;
      const sd = 15;
      const hensachi = Math.round(50 + (total - mean) / sd * 10);
      return Math.min(75, Math.max(25, hensachi));
    }

    function hensachiToTopPct(h) {
      const table = {
        75: 0.6,  70: 2,   68: 3,   65: 7,
        63: 10,   60: 16,  58: 21,  55: 31,
        53: 38,   50: 50,  48: 58,  45: 69,
        43: 74,   40: 84,  38: 88,  35: 93,
        30: 98,   25: 99.4
      };
      const keys = Object.keys(table).map(Number).sort((a, b) => b - a);
      for (const k of keys) {
        if (h >= k) return table[k];
      }
      return 99.4;
    }

    function computeResult(qs,ans){
      // axis sums
      const axis={V:0,N:0,A:0,W:0,H:0,L:0};
      const norm={V:0,N:0,A:0,W:0,H:0,L:0}; // counts
      let selfSum=0,selfN=0,factSum=0,factN=0;
      const ind={}; const indN={};
      qs.forEach(q=>{
        let v=ans[q.id]||3;
        if(q.r) v=6-v;                 // reverse
        // axis
        if(["V","N","A","W","H","L"].includes(q.t)){ axis[q.t]+=v; norm[q.t]+=1; }
        // OG
        if(q.og==="self"){ selfSum+=v; selfN++; }
        if(q.og==="fact"){ factSum+=v; factN++; }
        // indicator
        if(q.i && DATA.ind[q.i]){ ind[q.i]=(ind[q.i]||0)+v; indN[q.i]=(indN[q.i]||0)+1; } // 7指標(DATA.ind)のみ採点。selfaware/intentは除外
      });
      const avg=(s,n)=>n? s/n :3;
      // axis winners (normalize per question then compare)
      const a1 = avg(axis.V,norm.V) >= avg(axis.N,norm.N) ? "V":"N";
      const a2 = avg(axis.A,norm.A) >= avg(axis.W,norm.W) ? "A":"W";
      const a3 = avg(axis.H,norm.H) >= avg(axis.L,norm.L) ? "H":"L";
      // OG: self vs fact gap on 0-100
      const selfPct=(avg(selfSum,selfN)-1)/4*100;
      const factPct=(avg(factSum,factN)-1)/4*100;
      const gap=selfPct-factPct;
      const a4 = gap> DATA.ogT ? "G":"O";
      const code=a1+a2+a3+a4;

      // total score: indicators avg -> 0-100
      let allInd=0,allN=0; Object.keys(ind).forEach(k=>{allInd+=ind[k];allN+=indN[k];});
      const total=Math.round((avg(allInd,allN)-1)/4*100);

      // per indicator 0-100
      const indScore={};
      Object.keys(ind).forEach(k=>{ indScore[k]=Math.round((ind[k]/indN[k]-1)/4*100); });
      // weak top3
      const weak=Object.keys(indScore).sort((a,b)=>indScore[a]-indScore[b]).slice(0,3);

      // 偏差値・上位%
      const hensachi = scoreToHensachi(total);
      const top_pct  = hensachiToTopPct(hensachi);

      return {code, name:DATA.types[code], desc:DATA.typeDesc[code], full:TYPEFULL[code],
        axes:{a1,a2,a3,a4}, gap:Math.round(gap), selfPct:Math.round(selfPct), factPct:Math.round(factPct),
        total, indScore, weak, isG:a4==="G", hensachi, top_pct};
    }

    // ---- OGシェアカード生成 ----
    async function generateShareCard(r, mode) {
      const canvas = document.createElement('canvas');
      canvas.width = 1200;
      canvas.height = 630;
      const ctx = canvas.getContext('2d');

      // 背景グラデーション
      const grad = ctx.createLinearGradient(0, 0, 1200, 630);
      grad.addColorStop(0, '#243b5e');
      grad.addColorStop(1, '#152A45');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 1200, 630);

      // MOTE LAB ロゴ
      ctx.font = '24px Georgia';
      ctx.fillStyle = '#C8A04D';
      ctx.textAlign = 'left';
      ctx.fillText('MOTE LAB', 80, 180);

      // YOUR TYPE
      ctx.font = '700 18px "Noto Sans JP", sans-serif';
      ctx.fillStyle = '#C8A04D';
      ctx.fillText('YOUR TYPE', 80, 220);

      // コード（Gold グラデ）
      const goldGrad = ctx.createLinearGradient(80, 0, 400, 0);
      goldGrad.addColorStop(0, '#C8A04D');
      goldGrad.addColorStop(1, '#E7C788');
      ctx.font = '800 72px Georgia';
      ctx.fillStyle = goldGrad;
      ctx.fillText(r.code, 80, 310);

      // タイプ名
      ctx.font = '700 42px "Noto Sans JP", sans-serif';
      ctx.fillStyle = '#FFFFFF';
      ctx.fillText(r.name, 80, 370);

      // サブコピー（モード分岐）
      const subcopy = (mode === "corporate" ? SUBCOPY_C[r.code] : SUBCOPY[r.code]) || '';
      ctx.font = '400 22px "Noto Sans JP", sans-serif';
      ctx.fillStyle = '#C7D3E6';
      // 長い場合は2行に折り返す（maxWidth 460px相当）
      const maxW = 460;
      if (ctx.measureText(subcopy).width <= maxW) {
        ctx.fillText(subcopy, 80, 410);
      } else {
        const mid = Math.ceil(subcopy.length / 2);
        ctx.fillText(subcopy.slice(0, mid), 80, 400);
        ctx.fillText(subcopy.slice(mid), 80, 430);
      }

      // 区切り線
      ctx.strokeStyle = 'rgba(200,160,77,0.4)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(80, 450);
      ctx.lineTo(480, 450);
      ctx.stroke();

      // 右ブロック: 総合スコアラベル
      ctx.font = '400 18px "Noto Sans JP", sans-serif';
      ctx.fillStyle = '#8195b3';
      ctx.textAlign = 'right';
      ctx.fillText('総合スコア', 1120, 220);

      // スコア数値
      ctx.font = '800 96px Georgia';
      ctx.fillStyle = '#C8A04D';
      ctx.fillText(String(r.total), 1020, 325);

      // / 100
      ctx.font = '400 32px "Noto Sans JP", sans-serif';
      ctx.fillStyle = '#8195b3';
      ctx.fillText('/ 100', 1120, 325);

      // 偏差値
      ctx.font = '400 24px "Noto Sans JP", sans-serif';
      ctx.fillStyle = '#FFFFFF';
      ctx.fillText(`偏差値 ${r.hensachi}`, 1120, 378);

      // 上位%
      ctx.font = '700 24px "Noto Sans JP", sans-serif';
      ctx.fillStyle = '#E7C788';
      ctx.fillText(`上位 ${r.top_pct}%`, 1120, 412);

      // 右下 MOTE LAB
      ctx.font = '400 20px Georgia';
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fillText('MOTE LAB', 1120, 600);

      // 左下 URL
      ctx.font = '400 18px "Noto Sans JP", sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.textAlign = 'left';
      ctx.fillText('test.mote-lab.group', 80, 600);

      return new Promise((resolve, reject) => canvas.toBlob(blob => {
        if (!blob) { reject(new Error('toBlob failed')); return; }
        resolve(URL.createObjectURL(blob));
      }, 'image/png'));
    }

            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.3c-5.52 0-10 3.62-10 8.08 0 3.99 3.55 7.33 8.35 7.97.32.07.77.21.88.49.1.25.07.64.03.89l-.14.84c-.04.25-.2 1 .88.54 1.07-.45 5.78-3.4 7.89-5.83C21.27 13.6 22 12.04 22 10.38 22 5.92 17.52 2.3 12 2.3zM8.13 12.6H6.2a.4.4 0 0 1-.4-.4V8.93a.4.4 0 0 1 .81 0v2.86h1.52a.4.4 0 0 1 0 .81zm1.5-.4a.4.4 0 0 1-.81 0V8.93a.4.4 0 0 1 .81 0v3.27zm3.93 0a.4.4 0 0 1-.28.38.4.4 0 0 1-.45-.15l-1.68-2.29v2.06a.4.4 0 0 1-.81 0V8.93a.4.4 0 0 1 .73-.23l1.68 2.29V8.93a.4.4 0 0 1 .81 0v3.27zm2.86-2.04a.4.4 0 0 1 0 .81h-1.13v.82h1.13a.4.4 0 0 1 0 .81h-1.53a.4.4 0 0 1-.4-.4V8.93a.4.4 0 0 1 .4-.4h1.53a.4.4 0 0 1 0 .81h-1.13v.82h1.13z"/></svg>
            LINEで無料カウンセリングを予約する
          </a>

          {/* サブCTA: 直接予約 */}
          <a href="https://calendar.app.google/RuULPFoZ9Fm7tUfC8" target="_blank" rel="noopener noreferrer"
            style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,
              background:"rgba(255,255,255,0.1)",border:"1.5px solid rgba(255,255,255,0.3)",
              color:"#fff",padding:"12px 24px",borderRadius:99,fontSize:14,fontWeight:600,textDecoration:"none",
              width:"100%",maxWidth:320,margin:"0 auto 20px"}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Web面談を直接予約する
          </a>

          {/* シェアボタン群 */}
          <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:10,flexWrap:"wrap",marginBottom:16}}>
            {/* X(Twitter) */}
            <a href={twitterUrl} target="_blank" rel="noopener noreferrer"
              style={{display:"inline-flex",alignItems:"center",gap:6,background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.2)",
                color:"#fff",padding:"8px 16px",borderRadius:99,fontSize:13,fontWeight:600,textDecoration:"none"}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.74l7.73-8.835L1.254 2.25H8.08l4.213 5.567 5.951-5.567zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
              Xでシェア
            </a>
            {/* LINE シェア */}
            <a href={lineShareUrl} target="_blank" rel="noopener noreferrer"
              style={{display:"inline-flex",alignItems:"center",gap:6,background:"#06C755",
                color:"#fff",padding:"8px 16px",borderRadius:99,fontSize:13,fontWeight:600,textDecoration:"none"}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.3c-5.52 0-10 3.62-10 8.08 0 3.99 3.55 7.33 8.35 7.97.32.07.77.21.88.49.1.25.07.64.03.89l-.14.84c-.04.25-.2 1 .88.54 1.07-.45 5.78-3.4 7.89-5.83C21.27 13.6 22 12.04 22 10.38 22 5.92 17.52 2.3 12 2.3z"/></svg>
              LINEでシェア
            </a>
            {/* IG用画像DL */}
            <button onClick={igDownload}
              style={{display:"inline-flex",alignItems:"center",gap:6,background:"rgba(193,53,132,0.9)",
                color:"#fff",padding:"8px 16px",borderRadius:99,fontSize:13,fontWeight:600,
                border:"none",cursor:shareCardUrl?"pointer":"default",opacity:shareCardUrl?1:0.4}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
              Instagramにシェア（画像を保存）
            </button>
          </div>

          {/* もう一度診断する / 全16タイプ */}
          <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:16,flexWrap:"wrap"}}>
            <button onClick={onRetry} style={{background:"none",border:"none",color:"#8195b3",fontSize:13,cursor:"pointer",textDecoration:"underline"}}>もう一度診断する</button>
            <a href="types.html" style={{color:"#8195b3",fontSize:13,textDecoration:"underline"}}>全16タイプを見る</a>
          </div>
        </div>
      );

      // ---- SEC-8: フッター ----
      const footerSection = (
        <p style={{textAlign:"center",color:"#6b7a93",fontSize:11,marginTop:20,lineHeight:1.6}}>
          ※ これは簡易自己診断です。結果は仮の目安であり、本サービスの正式スコアとは異なります。
        </p>
      );

      return <div style={{maxWidth:620,margin:"0 auto",width:"100%",paddingBottom:40}}>
        {heroSection}
        {narrativeSection}
        {radarSection}
        {gapSection}
        {strengthSection}
        {weakSection}
        {ctaSection}
        {footerSection}
      </div>;
    }

    function Radar({indScore, weakKey}){
      const keys=Object.keys(indScore);
      const n=keys.length, R=78, cx=110, cy=110;
      const pt=(i,r)=>{ const a=-Math.PI/2 + i*2*Math.PI/n; return [cx+r*Math.cos(a), cy+r*Math.sin(a)]; };
      const poly=keys.map((k,i)=>pt(i,R*indScore[k]/100).join(",")).join(" ");
      return <svg viewBox="0 0 220 220" style={{width:"100%",maxWidth:300,display:"block",margin:"0 auto"}}>
        {[0.25,0.5,0.75,1].map((f,gi)=>(
          <polygon key={gi} points={keys.map((k,i)=>pt(i,R*f).join(",")).join(" ")} fill="none" stroke={LINE} strokeWidth="1"/>
        ))}
        {keys.map((k,i)=>{
          const[x,y]=pt(i,R);
          const isWeak = k === weakKey;
          return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke={isWeak?WARN:LINE} strokeWidth={isWeak?2.5:1}/>;
        })}
        <polygon points={poly} fill="rgba(200,160,77,0.13)" stroke="#C8A04D" strokeWidth="2"/>
        {keys.map((k,i)=>{
          const[x,y]=pt(i,R+16);
          const isWeak = k === weakKey;
          return <text key={i} x={x} y={y} fontSize="9" fill={isWeak?WARN:GRAY} fontWeight={isWeak?"bold":"normal"} textAnchor="middle" dominantBaseline="middle">{IND_SHORT[k]||IND_LABEL[k]}</text>;
        })}
        {keys.map((k,i)=>{
          if(k !== weakKey) return null;
          const[x,y]=pt(i,R*indScore[k]/100);
          return <circle key={"wk"+i} cx={x} cy={y} r="5" fill={WARN}/>;
        })}
      </svg>;
    }

    function GapBar({label,v,color}){
      return <div style={{marginBottom:9}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:GRAY,marginBottom:3}}>
          <span>{label}</span><span style={{fontFamily:"Georgia,serif"}}>{v}</span>
        </div>
        <div style={{height:8,background:CARD,borderRadius:99,overflow:"hidden"}}>
          <div style={{height:"100%",width:v+"%",background:color,borderRadius:99}}/>
        </div>
      </div>;
    }

    function DetailRow({label,text,accent}){
      return <div style={{display:"flex",gap:12,marginBottom:10,alignItems:"flex-start"}}>
        <span style={{flex:"0 0 64px",fontSize:11,fontWeight:800,color:accent,letterSpacing:"0.04em",
          paddingTop:2,textAlign:"right"}}>{label}</span>
        <span style={{flex:1,color:INK,fontSize:13.5,lineHeight:1.7,textAlign:"left"}}>{text}</span>
      </div>;
    }

    function Shell({children,scroll}){
      return <div style={{minHeight:"100vh",background:`radial-gradient(1200px 600px at 50% -10%, #243b5e, ${NAVYD} 60%)`,
        display:"flex",alignItems:scroll?"flex-start":"center",justifyContent:"center",padding:"40px 20px",
        fontFamily:"'Noto Sans JP',system-ui,-apple-system,'Hiragino Kaku Gothic ProN',Meiryo,sans-serif"}}>
        {children}
      </div>;
    }

    function ModeBtn({active,onClick,title,sub}){
      return <button onClick={onClick} style={{flex:"1 1 180px",maxWidth:220,textAlign:"left",padding:"16px 18px",borderRadius:12,
        background:active?"rgba(200,160,77,0.14)":"rgba(255,255,255,0.05)",
        border:`1.5px solid ${active?GOLD:"rgba(255,255,255,0.16)"}`,cursor:"pointer",transition:"all .15s"}}>
        <div style={{color:"#fff",fontWeight:700,fontSize:15,marginBottom:3}}>{title}</div>
        <div style={{color:"#8195b3",fontSize:12}}>{sub}</div>
      </button>;
    }

    const bigBtn={background:`linear-gradient(90deg,${GOLD},${GOLDLT})`,color:NAVYD,border:"none",
      padding:"15px 32px",borderRadius:99,fontSize:16,fontWeight:800,cursor:"pointer",boxShadow:"0 6px 20px rgba(200,160,77,0.3)"};
    const scaleBtn={background:"rgba(255,255,255,0.05)",border:"1.5px solid rgba(255,255,255,0.18)",color:"#fff",
      padding:"15px 18px",borderRadius:11,fontSize:15,cursor:"pointer",textAlign:"left",transition:"all .12s",width:"100%"};
    const backBtn={background:"none",border:"none",color:"#8195b3",fontSize:13,cursor:"pointer",marginTop:22,padding:0};
    const panel={background:"#fff",borderRadius:14,padding:"20px 22px",marginBottom:14,boxShadow:"0 4px 16px rgba(0,0,0,0.16)"};

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
